<h2 mat-dialog-title>Vendor</h2>

<div mat-dialog-content>

<mat-form-field appearance="outline">
<mat-label>Name</mat-label>
<input matInput [formControl]="form.controls.name">
</mat-form-field>

<mat-form-field appearance="outline">
<mat-label>Email</mat-label>
<input matInput [formControl]="form.controls.email">
</mat-form-field>

<mat-form-field appearance="outline">
<mat-label>Phone</mat-label>
<input matInput [formControl]="form.controls.phone">
</mat-form-field>

<mat-form-field appearance="outline">
<mat-label>Address</mat-label>
<input matInput [formControl]="form.controls.address">
</mat-form-field>

</div>

<div mat-dialog-actions>

<button mat-button (click)="close()">Cancel</button>

<button mat-raised-button color="primary"
(click)="save()">
Save
</button>

</div>
