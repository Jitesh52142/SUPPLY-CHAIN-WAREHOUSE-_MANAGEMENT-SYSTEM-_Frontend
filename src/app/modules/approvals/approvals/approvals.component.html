<h2>Pending Approvals</h2>

<table mat-table [dataSource]="approvals">

<ng-container matColumnDef="id">
<th mat-header-cell *matHeaderCellDef>ID</th>
<td mat-cell *matCellDef="let a">{{a.id}}</td>
</ng-container>

<ng-container matColumnDef="module">
<th mat-header-cell *matHeaderCellDef>Module</th>
<td mat-cell *matCellDef="let a">{{a.moduleName}}</td>
</ng-container>

<ng-container matColumnDef="referenceId">
<th mat-header-cell *matHeaderCellDef>Reference</th>
<td mat-cell *matCellDef="let a">{{a.referenceId}}</td>
</ng-container>

<ng-container matColumnDef="status">
<th mat-header-cell *matHeaderCellDef>Status</th>
<td mat-cell *matCellDef="let a">{{a.status}}</td>
</ng-container>

<ng-container matColumnDef="actions">
<th mat-header-cell *matHeaderCellDef>Actions</th>
<td mat-cell *matCellDef="let a">

<button mat-button color="primary"
(click)="approve(a)">
Approve
</button>

<button mat-button color="warn"
(click)="reject(a)">
Reject
</button>

</td>
</ng-container>

<tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
<tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

</table>
