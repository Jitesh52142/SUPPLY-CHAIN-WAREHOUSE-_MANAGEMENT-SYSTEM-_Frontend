<h2>Purchase Orders</h2>

<table border="1" width="100%">

<tr>
<th>ID</th>
<th>Vendor</th>
<th>Status</th>
<th>Total</th>
<th>Actions</th>
</tr>

<tr *ngFor="let order of orders">

<td>{{order.id}}</td>
<td>{{order.vendor}}</td>
<td>{{order.status}}</td>
<td>{{order.total}}</td>

<td>
<button>Delete</button>
</td>

</tr>

</table>
